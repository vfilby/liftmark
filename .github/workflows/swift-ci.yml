name: Swift CI

on:
  push:
    branches: [main]
    paths:
      - 'mobile-apps/ios/**'
      - 'e2e-spec/**'
      - '.github/workflows/swift-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mobile-apps/ios/**'
      - 'e2e-spec/**'
      - '.github/workflows/swift-ci.yml'

jobs:
  build-and-test:
    runs-on: macos-26
    defaults:
      run:
        working-directory: mobile-apps/ios

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: SwiftLint
        run: |
          brew install swiftlint
          swiftlint lint --reporter github-actions-logging

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Install XcodeGen
        run: |
          brew install xcodegen
          INSTALLED=$(xcodegen --version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          EXPECTED="2.45.3"
          if [ "$INSTALLED" != "$EXPECTED" ]; then
            echo "::error::XcodeGen version mismatch: expected $EXPECTED, got $INSTALLED"
            exit 1
          fi

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -scheme LiftMark -project LiftMark.xcodeproj

      - name: Build
        run: |
          xcodebuild build \
            -scheme LiftMark \
            -project LiftMark.xcodeproj \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=26.0' \
            | xcpretty

      - name: Run unit tests
        run: |
          xcodebuild test \
            -scheme LiftMark \
            -project LiftMark.xcodeproj \
            -only-testing:LiftMarkTests \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=26.0' \
            -resultBundlePath TestResults.xcresult \
            | xcpretty

      # Note: UI tests (LiftMarkUITests) are not run in CI — they require
      # a booted simulator and are slow. Run them manually or in a dedicated workflow.

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: mobile-apps/ios/TestResults.xcresult
          retention-days: 7
