name: Validator CI

on:
  push:
    branches: [main]
    paths:
      - 'validator/**'
      - '.github/workflows/validator-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'validator/**'
      - '.github/workflows/validator-ci.yml'

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: validator

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: validator/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test
