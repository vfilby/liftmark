name: "Detail and settings screens"

setup:
  - action: launchApp
    newInstance: true
  - action: tryCatch
    try:
      - action: waitFor
        target: "home-screen"
        timeout: 30000
    catch:
      - action: waitFor
        target: "max-lift-tile-0"
        timeout: 5000

tests:
  - name: "shows history detail screen"
    steps:
      - action: tap
        target: "tab-history"
      - action: waitFor
        target: "history-screen"
        timeout: 5000
      # Only test if there are history items
      - action: tryCatch
        try:
          - action: waitFor
            target: "history-session-card"
            timeout: 3000
          - action: tapIndex
            target: "history-session-card"
            index: 0
          - action: waitFor
            target: "history-detail-screen"
            timeout: 5000
        catch: []

  - name: "settings screen shows theme selector"
    steps:
      - action: tap
        target: "tab-settings"
      - action: waitFor
        target: "settings-screen"
        timeout: 5000
      - action: expect
        target: "button-theme-light"
        assertion: "toBeVisible"
      - action: expect
        target: "button-theme-dark"
        assertion: "toBeVisible"
      - action: expect
        target: "button-theme-auto"
        assertion: "toBeVisible"

  - name: "dark mode applies when selected"
    steps:
      - action: tap
        target: "tab-settings"
      - action: waitFor
        target: "settings-screen"
        timeout: 5000
      # Select dark theme
      - action: tap
        target: "button-theme-dark"
      # Verify theme is applied (dark mode changes are visual;
      # test confirms the button is interactive and setting persists)
      - action: expect
        target: "button-theme-dark"
        assertion: "toBeVisible"
      # Navigate away and back to verify persistence
      - action: tap
        target: "tab-home"
      - action: waitFor
        target: "home-screen"
        timeout: 5000
      - action: tap
        target: "tab-settings"
      - action: waitFor
        target: "settings-screen"
        timeout: 5000
      # Restore to auto
      - action: tap
        target: "button-theme-auto"

  - name: "iCloud sync screen shows status content"
    steps:
      - action: tap
        target: "tab-settings"
      - action: waitFor
        target: "settings-screen"
        timeout: 5000
      - action: tap
        target: "sync-settings-button"
      - action: waitFor
        target: "sync-settings-screen"
        timeout: 5000
      # Screen must NOT be empty — must show status badge and info text
      - action: expect
        target: "sync-status-badge"
        assertion: "toBeVisible"
      - action: expect
        target: "sync-info-text"
        assertion: "toBeVisible"

  - name: "HealthKit toggle shows status information"
    steps:
      - action: tap
        target: "tab-settings"
      - action: waitFor
        target: "settings-screen"
        timeout: 5000
      - action: expect
        target: "switch-healthkit"
        assertion: "toBeVisible"
      # HealthKit status label should be visible (shows authorization state)
      - action: expect
        target: "healthkit-status-label"
        assertion: "toBeVisible"

  - name: "Live Activities toggle respects OS permission"
    steps:
      - action: tap
        target: "tab-settings"
      - action: waitFor
        target: "settings-screen"
        timeout: 5000
      - action: expect
        target: "switch-live-activities"
        assertion: "toBeVisible"
      # Status label should be visible (shows permission state)
      - action: expect
        target: "live-activities-status-label"
        assertion: "toBeVisible"
