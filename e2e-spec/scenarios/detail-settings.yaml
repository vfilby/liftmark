name: "Detail and settings screens"

setup:
  - action: launchApp
    newInstance: true
  - action: tryCatch
    try:
      - action: waitFor
        target: "home-screen"
        timeout: 30000
    catch:
      - action: waitFor
        target: "max-lift-tile-0"
        timeout: 5000

tests:
  - name: "shows history detail screen"
    steps:
      - action: tap
        target: "tab-history"
      - action: waitFor
        target: "history-screen"
        timeout: 5000
      # Only test if there are history items
      - action: tryCatch
        try:
          - action: waitFor
            target: "history-session-card"
            timeout: 3000
          - action: tapIndex
            target: "history-session-card"
            index: 0
          - action: waitFor
            target: "history-detail-screen"
            timeout: 5000
        catch: []

  # Issue 1: Dark mode must actually apply, not just store a preference
  - name: "theme segmented picker is visible"
    steps:
      - action: tap
        target: "tab-settings"
      - action: waitFor
        target: "settings-screen"
        timeout: 5000
      - action: expect
        target: "picker-theme"
        assertion: "toBeVisible"

  - name: "selecting dark theme applies immediately and persists"
    steps:
      - action: tap
        target: "tab-settings"
      - action: waitFor
        target: "settings-screen"
        timeout: 5000
      # Select dark theme via segmented picker
      - action: tapSegment
        target: "picker-theme"
        segment: "Dark"
      - action: delay
        ms: 500
      # Navigate to a different tab to verify theme applies globally
      - action: tap
        target: "tab-home"
      - action: waitFor
        target: "home-screen"
        timeout: 5000
      # Navigate back to settings — dark theme should still be active
      - action: tap
        target: "tab-settings"
      - action: waitFor
        target: "settings-screen"
        timeout: 5000
      # The picker should still be visible
      - action: expect
        target: "picker-theme"
        assertion: "toBeVisible"
      # Restart the app and verify theme persists
      - action: launchApp
        newInstance: true
      - action: tryCatch
        try:
          - action: waitFor
            target: "home-screen"
            timeout: 30000
        catch:
          - action: waitFor
            target: "max-lift-tile-0"
            timeout: 5000
      - action: tap
        target: "tab-settings"
      - action: waitFor
        target: "settings-screen"
        timeout: 5000
      # Picker should still be visible after restart
      - action: expect
        target: "picker-theme"
        assertion: "toBeVisible"
      # Restore to auto for other tests
      - action: tapSegment
        target: "picker-theme"
        segment: "Auto"

  - name: "selecting light theme applies and differs from dark"
    steps:
      - action: tap
        target: "tab-settings"
      - action: waitFor
        target: "settings-screen"
        timeout: 5000
      # Select light explicitly via segmented picker
      - action: tapSegment
        target: "picker-theme"
        segment: "Light"
      - action: delay
        ms: 500
      # Verify it persists by navigating away and back
      - action: tap
        target: "tab-home"
      - action: delay
        ms: 300
      - action: tap
        target: "tab-settings"
      - action: waitFor
        target: "settings-screen"
        timeout: 5000
      - action: expect
        target: "picker-theme"
        assertion: "toBeVisible"
      # Restore to auto
      - action: tapSegment
        target: "picker-theme"
        segment: "Auto"

  # Issue 2: iCloud sync screen must not be empty
  - name: "iCloud sync screen displays status and informational content"
    steps:
      - action: tap
        target: "tab-settings"
      - action: waitFor
        target: "settings-screen"
        timeout: 5000
      - action: tap
        target: "sync-settings-button"
      - action: waitFor
        target: "sync-settings-screen"
        timeout: 5000
      # Screen MUST show a status badge (colored indicator of iCloud state)
      - action: expect
        target: "sync-status-badge"
        assertion: "toBeVisible"
      # Screen MUST show a human-readable status label
      - action: expect
        target: "sync-status-label"
        assertion: "toBeVisible"
      # Screen MUST show explanatory info text (never empty)
      - action: expect
        target: "sync-info-text"
        assertion: "toBeVisible"
      # Check Status button must be visible for manual refresh
      - action: expect
        target: "sync-check-status"
        assertion: "toBeVisible"

  # Issue 3: Live Activities toggle must reflect OS-level permission
  - name: "Live Activities toggle shows permission status"
    steps:
      - action: tap
        target: "tab-settings"
      - action: waitFor
        target: "settings-screen"
        timeout: 5000
      # The toggle must exist
      - action: expect
        target: "switch-live-activities"
        assertion: "toBeVisible"
      # A status label must be visible showing the OS permission state
      # (e.g., "Enabled", or "Disabled — go to Settings to enable")
      - action: expect
        target: "live-activities-status-label"
        assertion: "toBeVisible"

  - name: "Live Activities shows settings link when OS permission denied"
    tags: ["requires-permission-denied"]
    steps:
      # This test requires Live Activities to be disabled at the OS level
      # (Settings > LiftMark > Live Activities = off)
      - action: tap
        target: "tab-settings"
      - action: waitFor
        target: "settings-screen"
        timeout: 5000
      # When OS permission is denied, the toggle should be disabled
      # and a link to open system Settings should be visible
      - action: tryCatch
        try:
          - action: waitFor
            target: "live-activities-open-settings"
            timeout: 3000
          - action: expect
            target: "live-activities-open-settings"
            assertion: "toBeVisible"
        catch: []
        # If the link isn't visible, OS permission may be granted —
        # that's OK, this test is conditional on OS state

  # Issue 4: HealthKit toggle must show authorization status
  - name: "HealthKit toggle shows status information"
    steps:
      - action: tap
        target: "tab-settings"
      - action: waitFor
        target: "settings-screen"
        timeout: 5000
      # The HealthKit toggle must exist
      - action: expect
        target: "switch-healthkit"
        assertion: "toBeVisible"
      # A status label must be visible showing authorization state
      # (e.g., "Not connected", "Connected", or "Access denied — open Settings")
      - action: expect
        target: "healthkit-status-label"
        assertion: "toBeVisible"

  - name: "HealthKit shows settings link when authorization denied"
    tags: ["requires-healthkit-denied"]
    steps:
      # This test requires HealthKit authorization to have been denied
      - action: tap
        target: "tab-settings"
      - action: waitFor
        target: "settings-screen"
        timeout: 5000
      # When authorization is denied, a link to open Health Settings should appear
      - action: tryCatch
        try:
          - action: waitFor
            target: "healthkit-open-settings"
            timeout: 3000
          - action: expect
            target: "healthkit-open-settings"
            assertion: "toBeVisible"
        catch: []
