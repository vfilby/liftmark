name: "Workout flow screens"

setupOnce:
  - action: launchApp
    newInstance: true

tests:
  - name: "covers workout detail, active workout, and summary flows"
    steps:
      # Wait for home screen
      - action: tryCatch
        try:
          - action: waitFor
            target: "home-screen"
            timeout: 30000
        catch:
          - action: waitFor
            target: "max-lift-tile-0"
            timeout: 5000

      # Go to home and import workout
      - action: tap
        target: "tab-home"
      - action: delay
        ms: 500
      - action: waitFor
        target: "button-import-workout"
        timeout: 5000
      - action: tap
        target: "button-import-workout"
      - action: waitFor
        target: "input-markdown"
        timeout: 10000
      - action: replaceText
        target: "input-markdown"
        fixture: "detox-flow-workout.md"
      - action: tap
        target: "button-import"
      - action: waitForText
        text: "OK"
        timeout: 10000
      - action: tapText
        text: "OK"

      # Tap on the workout in recent plans
      - action: waitForText
        text: "Detox Flow Workout"
        timeout: 10000
      - action: tapText
        text: "Detox Flow Workout"

      # Issue 7: Workout detail must show weight values
      # The fixture has "135 x 5" — verify weight "135" is visible on detail screen
      - action: waitFor
        target: "start-workout-button"
        timeout: 10000
      - action: waitForText
        text: "Bench Press"
        timeout: 5000
      - action: waitForText
        text: "135"
        timeout: 5000

      # Issue 6: Tapping Start Workout MUST navigate to active workout screen
      - action: tap
        target: "start-workout-button"

      # The active workout screen MUST appear — this is the critical navigation
      - action: waitFor
        target: "active-workout-screen"
        timeout: 10000
      - action: waitFor
        target: "active-workout-progress"
        timeout: 5000
      # Verify the workout name is visible on active screen
      - action: waitForText
        text: "Detox Flow Workout"
        timeout: 5000
      # Verify exercise name is shown
      - action: waitForText
        text: "Bench Press"
        timeout: 5000

      # Issue 7: Weight must be visible on active workout screen too
      - action: waitForText
        text: "135"
        timeout: 5000

      # Finish the workout
      - action: waitFor
        target: "active-workout-finish-button"
        timeout: 5000
      - action: tap
        target: "active-workout-finish-button"

      # Handle finish dialogs — may be "Finish Anyway", "Log Anyway" (discard dialog), or "Finish"
      - action: tryCatch
        try:
          - action: waitForText
            text: "Finish Anyway"
            timeout: 3000
          - action: tapText
            text: "Finish Anyway"
        catch:
          - action: tryCatch
            try:
              - action: waitForText
                text: "Log Anyway"
                timeout: 3000
              - action: tapText
                text: "Log Anyway"
            catch:
              - action: tryCatch
                try:
                  - action: waitForText
                    text: "Finish"
                    timeout: 3000
                  - action: tapText
                    text: "Finish"
                catch: []

      # Wait for summary and dismiss
      - action: waitFor
        target: "workout-summary-done-button"
        timeout: 10000
      - action: tap
        target: "workout-summary-done-button"

      # Verify back on home
      - action: tryCatch
        try:
          - action: waitFor
            target: "home-screen"
            timeout: 10000
        catch:
          - action: waitFor
            target: "button-import-workout"
            timeout: 5000
