name: LiftMark
options:
  bundleIdPrefix: com.eff3.liftmark.native-ios
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_BITCODE: false
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: "6.24.0"

targets:
  LiftMark:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: LiftMark
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eff3.liftmark.native-ios
        INFOPLIST_GENERATION_MODE: GeneratedFile
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_CFBundleDisplayName: LiftMark
        INFOPLIST_KEY_NSHealthShareUsageDescription: "LiftMark reads your workout history to track progress."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "LiftMark saves your completed workouts to Apple Health."
        INFOPLIST_KEY_NSSupportsLiveActivities: true
        CODE_SIGN_ENTITLEMENTS: LiftMark/LiftMark.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.eff3.liftmark.native-ios.dev
          INFOPLIST_KEY_CFBundleDisplayName: "LiftMark Dev"
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "LiftMark Native App Store"
    info:
      path: LiftMark/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - liftmark
            CFBundleURLName: com.eff3.liftmark.native-ios
        CFBundleDocumentTypes:
          - CFBundleTypeName: Markdown Document
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - net.daringfireball.markdown
              - public.plain-text
        LSSupportsOpeningDocumentsInPlace: false
        ITSAppUsesNonExemptEncryption: false
    preBuildScripts:
      - name: Generate BuildInfo
        script: |
          GIT_HASH=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
          cat > "${SRCROOT}/LiftMark/App/BuildInfo.swift" << SWIFT
          // Auto-generated at build time — do not edit
          enum BuildInfo {
              static let gitHash = "${GIT_HASH}"
          }
          SWIFT
        outputFiles:
          - $(SRCROOT)/LiftMark/App/BuildInfo.swift
    dependencies:
      - package: GRDB
      - target: LiveWorkouts
    entitlements:
      path: LiftMark/LiftMark.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access:
          - health-records
        com.apple.developer.healthkit.background-delivery: true
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.eff3.liftmark.v2
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.com.eff3.liftmark.v2
        com.apple.developer.ubiquity-kvstore-identifier: "$(TeamIdentifierPrefix)com.eff3.liftmark"

  LiveWorkouts:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: LiveWorkouts
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eff3.liftmark.native-ios.LiveWorkouts
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: LiveWorkouts
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_EMIT_LOC_STRINGS: true
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.eff3.liftmark.native-ios.dev.LiveWorkouts
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "LiftMark LiveWorkouts App Store"

  LiftMarkTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: LiftMarkTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: LiftMark
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eff3.liftmark.native-ios.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/LiftMark.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/LiftMark"
        BUNDLE_LOADER: "$(TEST_HOST)"

  LiftMarkUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: LiftMarkUITests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: LiftMark
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eff3.liftmark.native-ios.uitests
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: LiftMark

schemes:
  LiftMark:
    build:
      targets:
        LiftMark: all
        LiveWorkouts: all
        LiftMarkTests: [test]
        LiftMarkUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LiftMarkTests
        - LiftMarkUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
