name: LiftMark
options:
  bundleIdPrefix: com.liftmark
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_BITCODE: false
    SWIFT_STRICT_CONCURRENCY: targeted

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: "6.24.0"

targets:
  LiftMark:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: LiftMark
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.liftmark.app
        INFOPLIST_GENERATION_MODE: GeneratedFile
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_CFBundleDisplayName: LiftMark
        INFOPLIST_KEY_NSHealthShareUsageDescription: "LiftMark reads your workout history to track progress."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "LiftMark saves your completed workouts to Apple Health."
        INFOPLIST_KEY_NSSupportsLiveActivities: true
        CODE_SIGN_ENTITLEMENTS: LiftMark/LiftMark.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: LiftMark/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - liftmark
            CFBundleURLName: com.liftmark.app
    dependencies:
      - package: GRDB
    entitlements:
      path: LiftMark/LiftMark.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access:
          - health-records
        com.apple.developer.healthkit.background-delivery: true

  LiftMarkTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: LiftMarkTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: LiftMark
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.liftmark.app.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/LiftMark.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/LiftMark"
        BUNDLE_LOADER: "$(TEST_HOST)"

  LiftMarkUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: LiftMarkUITests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: LiftMark
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.liftmark.app.uitests
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: LiftMark

schemes:
  LiftMark:
    build:
      targets:
        LiftMark: all
        LiftMarkTests: [test]
        LiftMarkUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LiftMarkTests
        - LiftMarkUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
